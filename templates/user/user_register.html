<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap.min.css" 
         integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/js/bootstrap.min.js" integrity="sha384-Tc5IQib027qvyjSMfHjOMaLkfuWVxZxUPnCJA7l2mCWNIpG9mGCD8wGNIcPD7Txa"
         crossorigin="anonymous"></script>
         <link rel="stylesheet" href="/static/style.css"> 
    <title>Task_Management</title>
</head>
<body>
   <div class="row" style="margin-top: 50px;">
    <div class="col-md-4"></div>
    <div class="col-md-4 m-auto" id="register_home_page">
        <center><h3 ><b>User Register</b></h3></center>
      
        <form action="user_register" method="POST">
            <div class="form-group">
                <input type="text" name="username" class="form-control" placeholder="Enter the name" required>
              
            </div>
            <div class="form-group">
                <input type="email" name="user_email" class="form-control" placeholder="Enter the email" required>
              
            </div>
            <div class="form-group">
                <input type="password" name="password" class="form-control" placeholder="Enter the password" required>
              
            </div>
            <!-- <div class="form-group">
                <input type="text" name="mobile" class="form-control" placeholder="Enter the Mobile No" required>
              
            </div> -->
            <div class="form-group">
                <center><input type="submit" name="user_register" value="Register" class="btn btn-warning"></center>
                    </div>
                    <center><label>You already have account? <a href="user_login">Login Now</a></label></center>

            <center><a href="/" class="btn btn-danger">Go to Home</a></center>

        </form>


    </div>

    <div class="col-md-4"></div>
   

   </div>

</body>
</html>
