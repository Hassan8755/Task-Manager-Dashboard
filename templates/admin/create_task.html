{%extends 'admin/base.html' %}

{% block content %}
<center><h3>Create a new task</h3></center>
     <div class="row">
     <div class="col-md-3"></div>
        <div class="col-md-6">
            <form action="" method="post">
                <div class="form-group">
                    <label for="">Select user:</label>
                    <select class="form-control" name="user_id">
                        {% for user in users %}
                            <option value="{{user[0]}}">{{user[1]}}</option>
                        {% endfor %}

                    </select>

                </div>
                <div class="form-group">
                    <label for="">Title:</label>
                    <input class="form-control" name="task_title">
                </div>
                <div class="form-group">
                    <label for="">Description</label>
                    <textarea  class="form-control" rows="3" cols="50" name="description" 
                    placeholder="Mention the task " id=""></textarea>

                </div>
               <div class="form-group">
                    <label for="">Start date:</label>
                    <input type="date" class="form-control" name="start_date">
                </div>
                <div class="form-group">
                    <label for="">End date:</label>
                    <input type="date" class="form-control" name="end_date">
                </div>
                <input type="submit" class="btn btn-warning" name="create task" value="Create">
                 
                
                 

            </form>

        </div>

        <div class="col-md-3"></div>
     </div>
 {% endblock %}
