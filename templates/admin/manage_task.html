

    {%extends 'admin/base.html' %}
    
    {% block content %}
   <center><h3>All  assigned tasks</h3></center> 
   <table class="table" style="background-color: whitesmoke;" width="75vw">
    <tr>
        <th>S.No</th>
        <th>Task ID</th>
        <th>Title</th>
        <th>User</th>
        <th>Description</th>
        <th>Start Date</th>
        <th>End Date</th>
        <th>Status</th>
        <th>Action</th>
    </tr>
    {%for task in task%}
        <tr class="bg-{{ 'success' if task[5] == 'Completed' else 'danger' if task[5] == 'Pending' else 'warning' }}">
            <td>{{loop.index}}</td>
            <td>{{task[0]}}</td>
            <td>{{task[1]}}</td>
            <td>{{task[9]}}</td>
            <td>{{task[2]}}</td>
            <td>{{task[3]}}</td>
            <td>{{task[4]}}</td>
            <td><span class="badge bg-secondary">{{task[5]}}</span></td>
            <td>
                <form action="{{ url_for('delete_task', id=task[0]) }}" method="post" onsubmit="return confirm('Are you sure?');">
                    <button type="submit" style="margin-bottom: 5px;" class="btn btn-danger btn-sm">Delete</button>
                </form>
                     
                <a href="{{ url_for('edit_task', id=task[0]) }}" class="btn btn-warning">Edit</a>
            </td>
        </tr>
    {% endfor %}

   </table> 

{% endblock %}
