<!DOCTYPE html>
<html lang="en">
<head>

 crossorigin="anonymous">

<body>
<div class="row" id="header">
  <div class="col-md-12">
    <div class="col-md-4" style="display: inline-block;">

    </div>
    <div class="col-md-6" style="display: inline-block; text-align: right;">
      
   
      <span style="margin-left: 25px;" ><b>Name: {{session.get("admin")[1]}}</b></span>

  </div>

</div>

          </td>

        </tr>

        </tr> -->

            <a href="admin_logout" type="button" id="Logout_link">Logout</a>
          </td>
        </tr>
